# SmashDreams Blog - Nginx Configuration
# Deploy to: /etc/nginx/conf.d/smashdreams.conf

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name SmashDreams.online www.SmashDreams.online;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name SmashDreams.online www.SmashDreams.online;

    root /var/www/smashdreams;
    index index.html;

    # SSL (Tencent Cloud free certificate)
    # 申请地址: https://console.cloud.tencent.com/ssl
    ssl_certificate /etc/nginx/ssl/SmashDreams.online.pem;
    ssl_certificate_key /etc/nginx/ssl/SmashDreams.online.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_comp_level 6;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Static assets with long cache
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /pagefind/ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon & robots
    location = /favicon.ico {
        expires 30d;
        access_log off;
    }

    location = /robots.txt {
        access_log off;
    }

    # Sitemap & RSS
    location = /sitemap-index.xml {
        expires 1d;
    }

    location = /rss.xml {
        expires 1d;
    }

    # Main fallback (SPA-style routing for Astro)
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
